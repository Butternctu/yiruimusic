    <!-- Dynamic Favicon Corner Rounding Script -->
    <script>
        (function() {
            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const size = img.width;
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                const radius = size * 0.22; 
                
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(size - radius, 0);
                ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius);
                ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size);
                ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                ctx.clip();
                
                ctx.drawImage(img, 0, 0);
                
                const roundedDataUrl = canvas.toDataURL('image/png');
                document.getElementById('favicon').href = roundedDataUrl;
                document.getElementById('apple-icon').href = roundedDataUrl;
            };
            // Use the original logo URL for script execution since vite bundles might dynamically change
            img.src = "/yirui_logo_black.png";
        })();
    </script>
